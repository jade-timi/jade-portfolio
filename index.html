<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jade | UI/UX Designer</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#0d0d0d;
      color:white;
      line-height:1.6;
    }

    .container{
      width:90%;
      max-width:1100px;
      margin:auto;
      padding:40px 0;
    }

    .hero{
      text-align:center;
      padding:60px 0;
    }

    .hero h1{
      font-size:3rem;
      margin-bottom:10px;
    }

    .hero p{
      font-size:1.2rem;
      color:#bdbdbd;
    }

    .socials{
      margin-top:20px;
    }

    .socials a{
      color:#a855f7;
      margin:0 10px;
      text-decoration:none;
      font-weight:bold;
    }

    .projects{
      margin-top:60px;
    }

    .projects h2{
      margin-bottom:20px;
      font-size:2rem;
    }

    .project-grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap:20px;
    }

    .project-card{
      background:#1a1a1a;
      border-radius:16px;
      padding:20px;
      border:1px solid #2a2a2a;
    }

    .project-card img{
      width:100%;
      border-radius:12px;
      margin-bottom:15px;
    }

    .project-card h3{
      margin-bottom:10px;
    }

    .project-card p{
      color:#cfcfcf;
      font-size:0.95rem;
    }
  </style>
</head>
<body>

  <div class="container">

    <section class="hero">
      <h1>Oluwafemi Timilehin</h1>
      <p>UI/UX Designer • Tech Enthusiast • Building the future one project at a time</p>

      <div class="socials">
        <a href="https://x.com/Timi_ux" target="_blank">X</a>
        <a href="https://www.instagram.com/timi.ux" target="_blank">Instagram</a>
      </div>
    </section>

    <section class="projects">
      <h2>Featured Project</h2>

      <div class="project-grid">
        <div class="project-card">
          <img src="gelato-home.png" alt="Gelato App Home Screen">
          <h3>Gelato App UI</h3>
          <p>A clean and modern mobile app experience designed for seamless ice cream ordering, from browsing to checkout.</p>
        </div>
      </div>
    </section>

  </div>

</body>
</html>
